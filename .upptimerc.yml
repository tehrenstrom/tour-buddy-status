# Change these first
owner: tehrenstrom # Your GitHub organization or username, where this repository lives
repo: tour-buddy-status # The name of this repository

sites:
  - name: Tour Buddy API
    url: https://api.tourbuddy.co/api/health
  - name: Google
    url: https://www.google.com
  - name: Wikipedia
    url: https://en.wikipedia.org
  - name: Hacker News
    url: https://news.ycombinator.com
  - name: Test Broken Site
    url: https://thissitedoesnotexist.koj.co
  - name: IPv6 test
    url: forwardemail.net
    port: 80
    check: "tcp-ping"
    ipv6: true

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.tourbuddy.co
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Tour Buddy Status
  introTitle: "**Tour Buddy Status** - Real-time monitoring of our services."
  introMessage: This status page monitors the health of Tour Buddy services. No server required - just GitHub Actions, Issues, and Pages.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/tehrenstrom/tour-buddy-status

# Upptime also supports notifications, assigning issues, and more
